schemaVersion: "1"
kind: mixin
name: cozy
displayName: Cozy nushell environment
description: >
  Layers cozy on top of the standard `shell` agent: brew tools (nushell,
  helix, zellij, lazygit, broot, topiary, jj, …), vendored nu modules
  under ~/repos/, dotfiles via `toolkit push-to-machine`, Claude skills,
  Claude Code with the nushell MCP. Same boot tail the Dockerfile and a
  host checkout run — see cozy-module/install/run-install.sh.

# Mirrors the Dockerfile ENV block. PATH is fully expanded (no ${PATH}
# reference) — kit-level value substitution behaviour is undocumented;
# absolute paths are safe across whatever the parent agent inherits.
environment:
  variables:
    PATH: /home/agent/.local/bin:/home/agent/.cargo/bin:/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    HOME: /home/agent
    HELIX_RUNTIME: /home/linuxbrew/.linuxbrew/opt/helix/libexec/runtime
    TERM: xterm-256color
    COLORTERM: truecolor
    TERM_PROGRAM: WezTerm
    LANG: C.UTF-8
    XDG_CONFIG_HOME: /home/agent/.config
    XDG_DATA_HOME: /home/agent/.local/share
    XDG_CACHE_HOME: /home/agent/.cache
    # Silence Homebrew's "Do you want to proceed?" install prompt — without a
    # TTY brew hangs on it forever. NONINTERACTIVE (set by run-install.sh when
    # it installs brew) only covers the brew installer, not package installs;
    # HOMEBREW_NO_ASK covers `brew install`.
    # NO_AUTO_UPDATE skips the implicit `brew update` before each install.
    HOMEBREW_NO_ASK: 1
    HOMEBREW_NO_AUTO_UPDATE: 1

# Provisional list — derived by walking the install path; needs verification
# on a real `sbx run`. Add what fails, prune what doesn't fire.
network:
  allowedDomains:
    # Homebrew: install script + formula API + bottle storage
    - raw.githubusercontent.com
    - formulae.brew.sh
    - ghcr.io
    - objects.githubusercontent.com
    - api.github.com
    # github.com covers the cozy repo clone below, brew tap clones,
    # ensure-nu fallback release tarballs, topiary-nushell + tree-sitter-nu
    # clones in topiary install, and `jj`/`gh` runtime use.
    - github.com
    - codeload.github.com
    # apt sources — bootstrap.nu rewrites /etc/apt/sources.list to https://
    - archive.ubuntu.com
    - security.ubuntu.com
    - ports.ubuntu.com
    # claude install fetches https://claude.ai/install.sh
    - claude.ai

# No `files/` — the cozy repo is cloned in-sandbox below. bootstrap.nu
# derives cozy_root from `path self`, so cloning to /home/agent/repos/cozy/
# lines up with the Dockerfile layout (three dirnames up from
# cozy-module/install/bootstrap.nu).
#
# github.com is already required at runtime (topiary clones tree-sitter-nu,
# ensure-nu downloads release tarballs, claude.ai/install.sh runs), so
# adding the cozy clone doesn't expand the trust surface — it just removes
# the pack-kit.nu staging step and the gitignored sbx-kit/files/ tree.

commands:
  install:
    # Clone cozy. The one step that can't live in run-install.sh — the
    # script doesn't exist in-sandbox until the clone lands. The shell
    # agent's base image ships git, so this runs before Homebrew. --depth 1
    # keeps the clone small (~4 MB vs full history). Pin to a tag/branch
    # via --branch if reproducibility matters.
    # GIT_TERMINAL_PROMPT=0: on a 404/renamed repo or proxy auth failure git
    # would prompt for a username with no TTY and hang — the same guard
    # _clone-or-fail.nu applies to every other clone in the tree.
    - command: GIT_TERMINAL_PROMPT=0 git clone --depth 1 https://github.com/nushell-prophet/cozy /home/agent/repos/cozy
      user: "1000"
      description: Clone cozy
    # The whole boot tail in one shared script: ensure brew (auto-installs —
    # Linux with passwordless sudo holds here) → ensure-nu.sh (installs nu,
    # pins on syntax drift) → nu bootstrap.nu (brew tools, XDG git, ~/repos/,
    # dotfiles, skills, broot, topiary, Claude Code + MCP; its Step 0 fires
    # via the /etc/sandbox-persistent.sh marker the base image ships). Same
    # script the Dockerfile RUNs and a host checkout runs, so the paths
    # can't drift in ordering.
    # Redirect to a log: sbx create/run swallow install-command stdout (no
    # flag to show it — verified on sbx create, which just sits silent for
    # the whole build). The log file is the only way to watch progress or
    # read back a failure: `sbx exec -it <name> tail -f /home/agent/cozy-install.log`
    # from a second terminal while create runs.
    # Not `| tee` because: under `sh -c` (dash, no pipefail) tee's exit code
    # would mask an installer failure, and sbx hides the live stream anyway.
    - command: /home/agent/repos/cozy/cozy-module/install/run-install.sh > /home/agent/cozy-install.log 2>&1
      user: "1000"
      description: Run the shared cozy installer (brew → ensure-nu → bootstrap.nu)
