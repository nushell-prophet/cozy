schemaVersion: "1"
kind: mixin
name: cozy
displayName: Cozy nushell environment
description: >
  Layers cozy on top of the standard `shell` agent: brew tools (nushell,
  helix, zellij, lazygit, broot, topiary, jj, …), vendored nu modules
  under ~/repos/, dotfiles via `toolkit push-to-machine`, Claude skills,
  Claude Code with the nushell MCP. Same bootstrap.nu the Dockerfile and
  host-install.sh paths use — see cozy-module/install/bootstrap.nu.

# Mirrors the Dockerfile ENV block. PATH is fully expanded (no ${PATH}
# reference) — kit-level value substitution behaviour is undocumented;
# absolute paths are safe across whatever the parent agent inherits.
environment:
  variables:
    PATH: /home/agent/.local/bin:/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    HOME: /home/agent
    HELIX_RUNTIME: /home/linuxbrew/.linuxbrew/opt/helix/libexec/runtime
    TERM: xterm-256color
    COLORTERM: truecolor
    TERM_PROGRAM: WezTerm
    LANG: C.UTF-8
    XDG_CONFIG_HOME: /home/agent/.config
    XDG_DATA_HOME: /home/agent/.local/share
    XDG_CACHE_HOME: /home/agent/.cache
    # Silence Homebrew's "Do you want to proceed?" install prompt — without a
    # TTY brew hangs on it forever. NONINTERACTIVE (above) only covers the brew
    # installer, not package installs; HOMEBREW_NO_ASK covers `brew install`.
    # NO_AUTO_UPDATE skips the implicit `brew update` before each install.
    HOMEBREW_NO_ASK: 1
    HOMEBREW_NO_AUTO_UPDATE: 1

# Provisional list — derived by walking the install path; needs verification
# on a real `sbx run`. Add what fails, prune what doesn't fire.
network:
  allowedDomains:
    # Homebrew: install script + formula API + bottle storage
    - raw.githubusercontent.com
    - formulae.brew.sh
    - ghcr.io
    - objects.githubusercontent.com
    - api.github.com
    # github.com covers the cozy repo clone below, brew tap clones,
    # ensure-nu fallback release tarballs, topiary-nushell + tree-sitter-nu
    # clones in topiary install, and `jj`/`gh` runtime use.
    - github.com
    - codeload.github.com
    # apt sources — bootstrap.nu rewrites /etc/apt/sources.list to https://
    - archive.ubuntu.com
    - security.ubuntu.com
    - ports.ubuntu.com
    # claude install fetches https://claude.ai/install.sh
    - claude.ai

# No `files/` — the cozy repo is cloned in-sandbox below. bootstrap.nu
# derives cozy_root from `path self`, so cloning to /home/agent/repos/cozy/
# lines up with the Dockerfile layout (three dirnames up from
# cozy-module/install/bootstrap.nu).
#
# github.com is already required at runtime (topiary clones tree-sitter-nu,
# ensure-nu downloads release tarballs, claude.ai/install.sh runs), so
# adding the cozy clone doesn't expand the trust surface — it just removes
# the pack-kit.nu staging step and the gitignored sbx-kit/files/ tree.

commands:
  install:
    # Clone cozy. The shell agent's base image ships git, so this runs
    # before Homebrew. --depth 1 keeps the clone small (~4 MB vs full
    # history). Pin to a tag/branch via --branch if reproducibility matters.
    # GIT_TERMINAL_PROMPT=0: on a 404/renamed repo or proxy auth failure git
    # would prompt for a username with no TTY and hang — the same guard
    # _clone-or-fail.nu applies to every other clone in the tree.
    - command: GIT_TERMINAL_PROMPT=0 git clone --depth 1 https://github.com/nushell-prophet/cozy /home/agent/repos/cozy
      user: "1000"
      description: Clone cozy
    # Install Homebrew. bootstrap.nu IS a nushell script, so brew (which
    # provides nu) must exist before we can hand off.
    - command: NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      user: "1000"
      description: Install Homebrew
    # Pre-install nushell so bootstrap.nu can run.
    - command: brew install nushell
      user: "1000"
      description: Pre-install nushell
    # Smoke-test latest nu against bootstrap.nu; fall back to the pinned
    # .nushell-version on parse failure (guards against pre-1.0 drift).
    - command: /home/agent/repos/cozy/cozy-module/install/ensure-nu.sh
      user: "1000"
      description: Pin nushell if latest can't parse bootstrap.nu
    # Full installer: brew tools, XDG git, ~/repos/, dotfiles, skills,
    # broot, topiary, Claude Code + MCP. Step 0 setup-docker-system fires
    # automatically via the /etc/sandbox-persistent.sh marker shipped by
    # the base image.
    - command: nu /home/agent/repos/cozy/cozy-module/install/bootstrap.nu
      user: "1000"
      description: Run the full cozy installer
